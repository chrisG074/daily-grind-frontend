<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Daily Grind</title>
    <style>
      body {
        margin: 0;
        font-family: Arial, sans-serif;
        background: #f6f7fb;
        color: #1c1c1c;
      }
      .container {
        max-width: 700px;
        margin: 3rem auto;
        background: #fff;
        border-radius: 12px;
        padding: 2rem;
        box-shadow: 0 10px 30px rgba(0, 0, 0, 0.08);
      }
      h1 {
        margin-top: 0;
      }
      button {
        border: 0;
        background: #1063ff;
        color: white;
        padding: 0.75rem 1rem;
        border-radius: 8px;
        cursor: pointer;
      }
      pre {
        background: #0b1020;
        color: #e4e9ff;
        padding: 1rem;
        border-radius: 8px;
        overflow: auto;
      }
    </style>
  </head>
  <body>
    <main class="container">
      <h1>Daily Grind</h1>
      <p id="api-url"></p>
      <button id="ping-btn">Test backend verbinding</button>
      <h3>Resultaat</h3>
      <pre id="result">Klik op de knop om /api/ping aan te roepen.</pre>
    </main>

    <script src="/config.js"></script>
    <script>
      const output = document.getElementById("result");
      const apiUrlText = document.getElementById("api-url");
      const apiUrl = window.APP_CONFIG?.API_URL || "http://localhost:5000";
      apiUrlText.textContent = `Backend URL: ${apiUrl}`;

      document.getElementById("ping-btn").addEventListener("click", async () => {
        try {
          const response = await fetch(`${apiUrl}/api/ping`);
          const data = await response.json();
          output.textContent = JSON.stringify(data, null, 2);
        } catch (error) {
          output.textContent = `Fout: ${error.message}`;
        }
      });
    </script>
  </body>
</html>
